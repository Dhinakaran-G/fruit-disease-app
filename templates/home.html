<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Disease Detection System</title>

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">

    <!-- Google Fonts (Poppins) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            /* Gradient background for a modern look */
            background: linear-gradient(135deg, #e3ffe7 0%, #d9e7ff 100%);
            min-height: 100vh;
        }

        /* Navbar Styling */
        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            color: #28a745 !important; /* A nice green color */
        }

        .navbar-brand:hover {
            color: #218838 !important;
        }

        .nav-link {
            font-weight: 600;
            margin-left: 15px;
            transition: color 0.3s ease;
        }

        /* Hero Section Styling */
        .hero-section {
            padding-top: 100px;
            padding-bottom: 50px;
            text-align: center;
        }

        .hero-title {
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: #555;
            max-width: 600px;
            margin: 0 auto 40px auto;
        }

        /* Button Styling & Hover Animation */
        .btn-custom {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px; /* Pill-shaped buttons */
            margin: 10px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-custom:hover {
            transform: translateY(-5px); /* Lifts the button on hover */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            color: white; /* Ensures text stays white on hover */
        }

        /* Fade-in Animation for the main content */
        .fade-in {
            animation: fadeIn 1.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Footer Styling */
        .footer {
            background-color: #343a40;
            color: white;
            padding: 20px 0;
            margin-top: auto; /* Pushes footer to the bottom */
            width: 100%;
        }
    </style>
</head>
<body class="d-flex flex-column">

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="bi bi-flower1"></i> FruitGuard
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/login">
                            <i class="bi bi-box-arrow-in-right"></i> Login
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/register">
                            <i class="bi bi-person-plus"></i> Register
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="hero-section fade-in flex-grow-1">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <h1 class="hero-title display-3">
                        <i class="bi bi-flower2 text-success"></i> Fruit Disease Detection System
                    </h1>
                    <p class="hero-subtitle">
                        Protect your harvest with the power of AI. Upload an image of a fruit leaf and get an instant, accurate diagnosis of potential diseases.
                    </p>
                    <!-- Action Buttons -->
                    <div>
                        <a href="/login" class="btn btn-success btn-custom">
                            <i class="bi bi-box-arrow-in-right"></i> Login
                        </a>
                        <a href="/register" class="btn btn-primary btn-custom">
                            <i class="bi bi-person-plus-fill"></i> Register
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer text-center">
        <div class="container">
            <p>&copy; 2024 FruitGuard. All Rights Reserved.</p>
        </div>
    </footer>


    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
